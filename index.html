/* ============================================
   estamos_ — agencia humana de soluciones tecno creativas
   Sistema: negro + azul eléctrico, big data futurista
   ============================================ */

:root {
  --bg: #000000;
  --fg: #f5f5f5;
  --fg-dim: #888888;
  --fg-faint: #2a2a2a;
  --accent: #5197f2;        /* azul eléctrico (corregido) */
  --accent-2: #9d6ae9;      /* púrpura */
  --accent-3: #b6c8f1;      /* azul pastel */
  --lavender: #d0dff7;      /* lavanda */
  --grid: rgba(255, 255, 255, 0.04);
  --grid-strong: rgba(81, 151, 242, 0.18);

  --font-sans: 'Manrope', system-ui, sans-serif;
  --font-serif: 'Fraunces', Georgia, serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  --maxw: 1440px;
  --gutter: clamp(20px, 4vw, 80px);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

body {
  cursor: none;
  position: relative;
  min-height: 100vh;
}

@media (max-width: 720px), (pointer: coarse) {
  body { cursor: auto; }
  .custom-cursor { display: none !important; }
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: none; border: none; background: none; color: inherit; }
@media (max-width: 720px), (pointer: coarse) { button { cursor: pointer; } }

img { display: block; max-width: 100%; }

::selection { background: var(--accent); color: #000; }

/* ============================================
   Background grid + noise (always-on, full page)
   ============================================ */
.bg-layers {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, var(--grid) 1px, transparent 1px),
    linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}
.bg-noise {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* ============================================
   Custom cursor
   ============================================ */
.custom-cursor {
  position: fixed;
  top: 0; left: 0;
  width: 16px; height: 16px;
  border: 1px solid var(--accent);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s ease, height 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  mix-blend-mode: difference;
}
.custom-cursor.hover {
  width: 56px; height: 56px;
  background: var(--accent);
  border-color: var(--accent);
}
.custom-cursor-dot {
  position: fixed;
  top: 0; left: 0;
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
}

/* ============================================
   Layout primitives
   ============================================ */
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 0 var(--gutter);
}

main {
  position: relative;
  z-index: 1;
}

section {
  position: relative;
  padding: clamp(80px, 12vh, 160px) 0;
}

/* ============================================
   Nav
   ============================================ */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 24px var(--gutter);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.02em;
  text-transform: none;
}
.nav-brand img { width: 28px; height: 28px; }
.nav-brand .underscore {
  display: inline-block;
  animation: blink 1.2s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a { opacity: 0.7; transition: opacity 0.2s; }
.nav-links a:hover { opacity: 1; color: var(--accent); }

.lang-toggle {
  display: inline-flex;
  border: 1px solid var(--fg-faint);
  border-radius: 999px;
  padding: 2px;
  font-size: 11px;
}
.lang-toggle button {
  padding: 4px 10px;
  border-radius: 999px;
  color: var(--fg-dim);
  transition: all 0.2s;
}
.lang-toggle button.active {
  background: var(--fg);
  color: var(--bg);
}

@media (max-width: 720px) {
  .nav-links a:not(.lang-toggle) { display: none; }
  .nav { padding: 16px var(--gutter); }
}

/* ============================================
   HERO
   ============================================ */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-top: 120px;
  padding-bottom: 80px;
}

.hero-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: clamp(40px, 8vh, 80px);
}
.hero-meta .blink-dot {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

.hero h1 {
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: clamp(44px, 8.5vw, 156px);
  line-height: 0.95;
  letter-spacing: -0.04em;
  font-style: italic;
}
.hero h1 .word {
  display: inline-block;
  position: relative;
}
.hero h1 .word.accent { color: var(--accent); font-style: italic; }
.hero h1 .word.italic-serif { font-style: italic; }
.hero h1 .word.sans {
  font-family: var(--font-sans);
  font-weight: 200;
  font-style: normal;
  letter-spacing: -0.05em;
}

.hero-tagline {
  margin-top: clamp(40px, 6vh, 64px);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 40px;
  flex-wrap: wrap;
}
.hero-tagline .lede {
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: clamp(18px, 1.6vw, 24px);
  line-height: 1.4;
  max-width: 540px;
  color: var(--fg);
}
.hero-tagline .lede strong {
  font-weight: 600;
  color: var(--accent);
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 16px 28px;
  border: 1px solid var(--fg);
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: all 0.3s;
  white-space: nowrap;
}
.hero-cta:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}
.hero-cta .arrow { transition: transform 0.3s; }
.hero-cta:hover .arrow { transform: translateX(4px); }

.hero-scroll-hint {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--fg-dim);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 12px;
}
.hero-scroll-hint::before,
.hero-scroll-hint::after {
  content: '';
  width: 40px; height: 1px;
  background: var(--fg-faint);
}

/* Big rotating logo behind hero */
.hero-bg-logo {
  position: absolute;
  right: -8%;
  top: 50%;
  transform: translateY(-50%);
  width: clamp(400px, 55vw, 900px);
  opacity: 0.06;
  pointer-events: none;
  animation: float-rotate 30s ease-in-out infinite;
  z-index: 0;
}
@keyframes float-rotate {
  0%, 100% { transform: translateY(-50%) rotate(0deg); }
  50% { transform: translateY(-48%) rotate(8deg); }
}

/* ============================================
   Section header — shared label/title pattern
   ============================================ */
.section-label {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 32px;
}
.section-label::before {
  content: '';
  display: inline-block;
  width: 24px;
  height: 1px;
  background: var(--accent);
}

.section-title {
  font-family: var(--font-serif);
  font-weight: 300;
  font-style: italic;
  font-size: clamp(40px, 5.5vw, 88px);
  line-height: 1.0;
  letter-spacing: -0.03em;
  margin-bottom: clamp(40px, 6vh, 80px);
  max-width: 900px;
}
.section-title .em {
  font-family: var(--font-sans);
  font-weight: 200;
  font-style: normal;
  letter-spacing: -0.04em;
  color: var(--accent);
}

.section-intro {
  font-size: clamp(17px, 1.4vw, 22px);
  line-height: 1.5;
  font-weight: 300;
  max-width: 720px;
  color: var(--fg);
  margin-bottom: 64px;
}
.section-intro strong { color: var(--accent); font-weight: 600; }

/* ============================================
   Section: Trabajamos con
   ============================================ */
.work-with {
  background: var(--bg);
  border-top: 1px solid var(--fg-faint);
}

.work-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 40px;
}
.work-card {
  position: relative;
  padding: 40px 32px;
  border: 1px solid var(--fg-faint);
  border-radius: 4px;
  background: rgba(255,255,255,0.01);
  transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  overflow: hidden;
}
.work-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
  z-index: 0;
}
.work-card:hover {
  border-color: var(--accent);
  transform: translateY(-4px);
}
.work-card:hover::before { opacity: 0.08; }
.work-card > * { position: relative; z-index: 1; }

.work-card .id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-dim);
  margin-bottom: 32px;
  letter-spacing: 0.1em;
}
.work-card .label {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(28px, 3vw, 40px);
  line-height: 1;
  margin-bottom: 16px;
  color: var(--accent-3);
}
.work-card p {
  font-size: 15px;
  line-height: 1.5;
  font-weight: 300;
  color: var(--fg);
}

@media (max-width: 900px) {
  .work-grid { grid-template-columns: 1fr; }
}

/* ============================================
   Section: Servicios
   ============================================ */
.services {
  border-top: 1px solid var(--fg-faint);
}
.service {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) 2fr;
  gap: clamp(40px, 6vw, 96px);
  padding: clamp(56px, 8vh, 96px) 0;
  border-bottom: 1px solid var(--fg-faint);
  align-items: start;
}
.service:last-child { border-bottom: none; }

.service-side {
  position: sticky;
  top: 120px;
}
.service-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: 16px;
}
.service-name {
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: clamp(40px, 4.5vw, 72px);
  line-height: 1.0;
  letter-spacing: -0.04em;
}
.service-name .accent { color: var(--accent); }

.service-body p {
  font-size: clamp(16px, 1.3vw, 19px);
  line-height: 1.6;
  font-weight: 300;
  margin-bottom: 18px;
  color: var(--fg);
}
.service-body .lead {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(22px, 2vw, 30px);
  line-height: 1.3;
  color: var(--lavender);
  margin-bottom: 32px;
}

@media (max-width: 900px) {
  .service { grid-template-columns: 1fr; gap: 24px; }
  .service-side { position: static; }
}

/* ============================================
   Section: EPA Methodology
   ============================================ */
.epa {
  border-top: 1px solid var(--fg-faint);
  position: relative;
  overflow: hidden;
}

.epa-verbs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--fg-faint);
  margin-top: 64px;
  margin-bottom: 96px;
  border: 1px solid var(--fg-faint);
}
.verb {
  background: var(--bg);
  padding: 48px 32px;
  position: relative;
  transition: background 0.3s;
}
.verb:hover { background: rgba(81, 151, 242, 0.04); }
.verb-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
  margin-bottom: 24px;
}
.verb-name {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(36px, 4vw, 56px);
  line-height: 1;
  margin-bottom: 16px;
  color: var(--accent);
}
.verb-desc {
  font-size: 15px;
  line-height: 1.55;
  font-weight: 300;
  color: var(--fg);
}

@media (max-width: 900px) {
  .epa-verbs { grid-template-columns: 1fr; }
}

/* Phases timeline */
.phases-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 40px;
  flex-wrap: wrap;
  gap: 16px;
}
.phases-title {
  font-family: var(--font-sans);
  font-weight: 200;
  font-size: clamp(28px, 3vw, 44px);
  letter-spacing: -0.03em;
}
.phases-title .em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 300;
  color: var(--accent);
}
.phases-counter {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
}

.phases {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0;
  border-top: 1px solid var(--fg-faint);
  border-bottom: 1px solid var(--fg-faint);
}
.phase {
  position: relative;
  padding: 32px 20px 96px;
  border-right: 1px solid var(--fg-faint);
  cursor: none;
  transition: background 0.3s;
}
@media (pointer: coarse) { .phase { cursor: pointer; } }
.phase:last-child { border-right: none; }
.phase:hover { background: rgba(81, 151, 242, 0.06); }

.phase-num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 24px;
}
.phase-name {
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: clamp(20px, 1.6vw, 26px);
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}
.phase-desc {
  font-size: 13px;
  line-height: 1.5;
  font-weight: 300;
  color: var(--fg-dim);
}
.phase::after {
  content: '';
  position: absolute;
  left: 20px;
  bottom: 32px;
  width: 16px; height: 16px;
  border: 1px solid var(--accent);
  transform: rotate(45deg);
  transition: all 0.3s;
}
.phase:hover::after {
  background: var(--accent);
  transform: rotate(45deg) scale(1.3);
}

@media (max-width: 1100px) {
  .phases { grid-template-columns: repeat(3, 1fr); }
  .phase:nth-child(3) { border-right: none; }
}
@media (max-width: 640px) {
  .phases { grid-template-columns: repeat(2, 1fr); }
  .phase { border-right: 1px solid var(--fg-faint) !important; }
  .phase:nth-child(2n) { border-right: none !important; }
}

/* ============================================
   Cliente / case
   ============================================ */
.client {
  border-top: 1px solid var(--fg-faint);
}
.client-card {
  border: 1px solid var(--fg-faint);
  padding: clamp(40px, 6vw, 72px);
  border-radius: 4px;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 64px;
  align-items: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}
.client-card:hover { border-color: var(--accent); }

.client-visual {
  aspect-ratio: 4/3;
  background:
    repeating-linear-gradient(45deg,
      rgba(81,151,242,0.08) 0,
      rgba(81,151,242,0.08) 2px,
      transparent 2px,
      transparent 12px),
    linear-gradient(135deg, #0a0a14 0%, #050510 100%);
  border: 1px solid var(--fg-faint);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--fg-dim);
}

.client-meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-dim); letter-spacing: 0.1em; margin-bottom: 24px; text-transform: uppercase; }
.client-name {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(36px, 4vw, 64px);
  line-height: 1;
  margin-bottom: 24px;
}
.client-desc {
  font-size: 17px;
  line-height: 1.5;
  font-weight: 300;
  color: var(--fg);
  margin-bottom: 32px;
}
.client-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.client-tags span {
  padding: 6px 14px;
  border: 1px solid var(--fg-faint);
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-dim);
}

.client-future {
  margin-top: 24px;
  padding: 24px;
  border: 1px dashed var(--fg-faint);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-dim);
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 12px;
}
.client-future::before {
  content: '＋';
  font-size: 20px;
  color: var(--accent);
}

@media (max-width: 900px) {
  .client-card { grid-template-columns: 1fr; gap: 32px; padding: 32px; }
}

/* ============================================
   Contact
   ============================================ */
.contact {
  border-top: 1px solid var(--fg-faint);
  padding-bottom: 0;
}
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(40px, 6vw, 96px);
  align-items: start;
}
.contact-pitch h2 {
  font-family: var(--font-serif);
  font-weight: 300;
  font-style: italic;
  font-size: clamp(48px, 6vw, 96px);
  line-height: 0.95;
  letter-spacing: -0.03em;
  margin-bottom: 32px;
}
.contact-pitch h2 .em {
  font-family: var(--font-sans);
  font-style: normal;
  font-weight: 200;
  letter-spacing: -0.04em;
  color: var(--accent);
}
.contact-pitch p {
  font-size: 17px;
  line-height: 1.5;
  font-weight: 300;
  color: var(--fg-dim);
  margin-bottom: 40px;
  max-width: 480px;
}
.contact-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  border-top: 1px solid var(--fg-faint);
  padding-top: 32px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.05em;
}
.contact-meta-grid .label {
  color: var(--fg-dim);
  margin-bottom: 8px;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.contact-meta-grid .value { color: var(--fg); font-size: 13px; }
.contact-meta-grid .value a:hover { color: var(--accent); }

.form {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.field {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--fg-faint);
  padding: 20px 0 16px;
  position: relative;
  transition: border-color 0.3s;
}
.field:focus-within { border-bottom-color: var(--accent); }
.field label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
}
.field label .req { color: var(--accent); }
.field input,
.field textarea,
.field select {
  font-family: var(--font-sans);
  font-size: 18px;
  font-weight: 300;
  background: transparent;
  border: none;
  color: var(--fg);
  outline: none;
  padding: 0;
  resize: none;
}
.field select option { background: #000; color: var(--fg); }
.field textarea { min-height: 80px; }
.field input::placeholder, .field textarea::placeholder { color: var(--fg-faint); }

.form-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 40px;
  flex-wrap: wrap;
  gap: 20px;
}
.submit-btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 20px 36px;
  background: var(--accent);
  color: #000;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 600;
  transition: all 0.3s;
}
.submit-btn:hover {
  background: var(--fg);
  transform: translateX(4px);
}
.form-status {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
}

@media (max-width: 900px) {
  .contact-grid { grid-template-columns: 1fr; }
}

/* ============================================
   Footer
   ============================================ */
.footer {
  border-top: 1px solid var(--fg-faint);
  padding: 64px var(--gutter) 32px;
  margin-top: 120px;
}
.footer-mark {
  font-family: var(--font-sans);
  font-weight: 200;
  font-size: clamp(14px, 1.5vw, 22px);

    canvas.className = 'data-rain';
    document.body.insertBefore(canvas, document.body.firstChild);
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, cols = [], fontSize = 14;
    const chars = '0101アイウエオカキクケコサシスセソタチツテトナニヌネノ△◇◆▷|/\\_·•+'.split('');
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      const colCount = Math.floor(W / fontSize);
      cols = new Array(colCount).fill(0).map(() => Math.random() * -H);
    }
    resize();
    window.addEventListener('resize', resize);
    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(0, 0, W, H);
      ctx.font = fontSize + 'px JetBrains Mono, monospace';
      for (let i = 0; i < cols.length; i++) {
        const ch = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        const y = cols[i];
        const grad = ctx.createLinearGradient(x, y - 30, x, y + 30);

/* global React, ReactDOM */
const { useState, useEffect, useRef, useMemo } = React;

// ============================================
// Custom cursor
// ============================================
function CustomCursor() {
  const ringRef = useRef(null);
  const dotRef = useRef(null);
  useEffect(() => {
    let rx = 0, ry = 0, dx = 0, dy = 0, tx = 0, ty = 0;
    const onMove = (e) => { tx = e.clientX; ty = e.clientY; };
    const onOver = (e) => {
      const target = e.target;
      if (target.closest && target.closest('a, button, input, textarea, select, .work-card, .verb, .phase, .lang-toggle')) {
        ringRef.current?.classList.add('hover');
      }
    };
    const onOut = (e) => {
      const target = e.target;
      if (target.closest && target.closest('a, button, input, textarea, select, .work-card, .verb, .phase, .lang-toggle')) {
        ringRef.current?.classList.remove('hover');
      }
    };
    let raf;
    const loop = () => {
      rx += (tx - rx) * 0.18;
      ry += (ty - ry) * 0.18;
      dx += (tx - dx) * 0.6;
      dy += (ty - dy) * 0.6;
      if (ringRef.current) ringRef.current.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
      if (dotRef.current) dotRef.current.style.transform = `translate(${dx}px, ${dy}px) translate(-50%, -50%)`;
      raf = requestAnimationFrame(loop);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseover', onOver);
    window.addEventListener('mouseout', onOut);
    raf = requestAnimationFrame(loop);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseover', onOver);
      window.removeEventListener('mouseout', onOut);
      cancelAnimationFrame(raf);
    };
  }, []);
  return (
    <>
      <div className="custom-cursor" ref={ringRef}></div>
      <div className="custom-cursor-dot" ref={dotRef}></div>
    </>
  );
}

// ============================================
// Reveal-on-scroll wrapper
// ============================================
function Reveal({ children, delay = 0, as: Tag = 'div', className = '', ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            el.classList.add('in');
            io.unobserve(el);
          }
        });
      },
      { threshold: 0.15, rootMargin: '0px 0px -10% 0px' }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  const cls = `reveal ${delay ? `reveal-delay-${delay}` : ''} ${className}`.trim();
  return <Tag ref={ref} className={cls} {...rest}>{children}</Tag>;
}

// Helper: render text with {em: ...} markers as <span class="em">
function renderRich(parts) {
  if (typeof parts === 'string') return parts;
  return parts.map((p, i) => {
    if (typeof p === 'string') return <React.Fragment key={i}>{p}</React.Fragment>;
    if (p && p.em) return <span className="em" key={i}>{p.em}</span>;
    return null;
  });
}

  // build flat array of words across lines for staggered delay
  let wordIndex = 0;
  return (
    <section className="hero" id="top">

// ============================================
// Contact
// ============================================
function Contact({ t }) {
  const [status, setStatus] = useState('idle'); // idle | sending | sent
  const [form, setForm] = useState({ name: '', email: '', org: '', type: '', message: '' });
  const update = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const submit = (e) => {
    e.preventDefault();
    setStatus('sending');
    setTimeout(() => setStatus('sent'), 900);
  };
  return (
    <section className="contact" id="contact">
      <div className="container">
        <Reveal as="div" className="section-label">{t.contact.label}</Reveal>
        <div className="contact-grid">
          <div className="contact-pitch">
            <Reveal as="h2" delay={1}>{renderRich(t.contact.title)}</Reveal>
            <Reveal as="p" delay={2}>{t.contact.pitch}</Reveal>
            <Reveal as="div" className="contact-meta-grid" delay={3}>
              {t.contact.metaGrid.map((m, i) => (
                <div key={i}>
                  <div className="label">{m.label}</div>
                  <div className="value">
                    {m.href ? <a href={m.href} target="_blank" rel="noopener">{m.value}</a> : m.value}
                  </div>
                </div>
              ))}
            </Reveal>
          </div>

          <Reveal as="form" className="form" delay={2} onSubmit={submit}>
            <div className="field">
              <label>{t.contact.fields.name} <span className="req">*</span></label>
              <input type="text" required value={form.name} onChange={update('name')} />
            </div>
            <div className="field">
              <label>{t.contact.fields.email} <span className="req">*</span></label>
              <input type="email" required value={form.email} onChange={update('email')} />
            </div>
            <div className="field">
              <label>{t.contact.fields.org}</label>
              <input type="text" value={form.org} onChange={update('org')} />
            </div>
            <div className="field">
              <label>{t.contact.fields.type}</label>
              <select value={form.type} onChange={update('type')}>
                {t.contact.fields.typeOptions.map((opt, i) => (
                  <option key={i} value={i === 0 ? '' : opt}>{opt}</option>
                ))}
              </select>
            </div>
            <div className="field">
              <label>{t.contact.fields.message} <span className="req">*</span></label>
              <textarea required rows="3" placeholder={t.contact.fields.messagePlaceholder} value={form.message} onChange={update('message')}></textarea>
            </div>
            <div className="form-actions">
              <button type="submit" className="submit-btn" disabled={status === 'sending'}>
                {status === 'sent' ? '✓ ' + t.contact.sent.split('.')[0] : status === 'sending' ? t.contact.sending : t.contact.submit}
                {status !== 'sent' && <span className="arrow">→</span>}
              </button>
              <div className="form-status">
                {status === 'sent' ? t.contact.sent : ''}
              </div>
            </div>
          </Reveal>
        </div>
      </div>
    </section>
  );
}

// ============================================

  return (
    <footer className="footer">
      <div className="footer-mark">estamos<span className="underscore">_</span></div>
      <div className="footer-grid">
        <div>{t.footer.copy}</div>
        <div style={{ display: 'flex', gap: 24 }}>
          {t.footer.links.map((l, i) => (

}

Object.assign(window, {
  CustomCursor, Reveal, Nav, Hero, WorkWith, Services, Marquee, Method, Client, Contact, Footer
});

  <script type="text/babel">
/* global React, ReactDOM, Nav, Hero, WorkWith, Services, Marquee, Method, Client, Contact, Footer, CustomCursor, ESTAMOS_CONTENT */
const { useState, useEffect } = React;

function App() {
  const [lang, setLang] = useState('es');
  const t = ESTAMOS_CONTENT[lang] || ESTAMOS_CONTENT.es;

  useEffect(() => {
    const onScroll = () => {
      const sp = window.scrollY / Math.max(1, document.body.scrollHeight - window.innerHeight);
      document.documentElement.style.setProperty('--scroll', sp.toFixed(3));
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <>
      <div className="bg-layers">
        <div className="bg-grid"></div>
        <div className="bg-noise"></div>
      </div>
      <CustomCursor />
      <Nav lang={lang} setLang={setLang} t={t} />
      <main>
        <Hero t={t} />
        <WorkWith t={t} />
        <Services t={t} />
        <Marquee words={t.marquee} />
        <Method t={t} />
        <Client t={t} />
        <Contact t={t} />
      </main>
      <Footer t={t} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>

  <script>
(function() {
  function run() {
    const words = document.querySelectorAll('.hero h1 .word');
    if (!words.length) { setTimeout(run, 100); return; }
    words.forEach((w, i) => {
      w.classList.add('entering');
      setTimeout(() => {
        w.classList.remove('entering');
        w.classList.add('entered');
      }, 100 + i * 80);
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => setTimeout(run, 200));
  else setTimeout(run, 200);
})();
</script>
  <script>
(function() {
  function ensureRevealed() {
    document.querySelectorAll('.reveal').forEach(el => {
      const r = el.getBoundingClientRect();
      if (r.top < window.innerHeight * 1.2) el.classList.add('in');
    });
  }
  window.addEventListener('scroll', ensureRevealed, { passive: true });
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => setTimeout(ensureRevealed, 300));
  else setTimeout(ensureRevealed, 300);
})();
</script>
</body>
